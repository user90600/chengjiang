<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車輛詳情｜誠匠二輪</title>
  <link rel="stylesheet" href="style.css?v=20260708-1">
</head>

<body>

<header class="navbar">
  <a class="logo" href="index.html">誠匠二輪</a>

  <nav>
    <a href="index.html">首頁</a>
    <a href="inventory.html">車輛列表</a>
    <a href="index.html#process">交易流程</a>
    <a href="sell.html">我要賣車</a>

    <div class="about-menu">
      <button class="about-trigger" type="button" aria-expanded="false">
        關於我們 <span>⌄</span>
      </button>

      <div class="about-dropdown">
        <a href="https://www.instagram.com/chengjiang.moto?igsh=NDQwMjZzNmVjY2Fo" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.facebook.com/share/1D3ot4ddPY/?mibextid=wwXIfr" target="_blank" rel="noopener">Facebook</a>
        <a href="https://line.me/ti/p/~cj.motor" target="_blank" rel="noopener">LINE 聯絡我們</a>
      </div>
    </div>

    <a href="admin.html" id="adminBtn" style="display: none;">後台</a>
  </nav>
</header>

<main>
  <section class="section inventory-section">
    <p class="section-kicker">BIKE DETAIL</p>
    <h2 id="bikeTitle">車輛詳情</h2>

    <div id="bikeDetail" class="bike-detail-wrap">
      <p class="loading-text">載入車輛資料中...</p>
    </div>
  </section>
</main>

<footer class="footer">
  <p>誠匠二輪｜嚴選中古機車</p>
  <p>週一至週六 10:00～21:00｜每週日公休</p>
</footer>

<script>
  if (localStorage.getItem("isAdmin") === "true") {
    document.getElementById("adminBtn").style.display = "inline-block";
  }

  const aboutMenu = document.querySelector(".about-menu");
  const aboutTrigger = document.querySelector(".about-trigger");

  aboutTrigger.addEventListener("click", () => {
    const isOpen = aboutMenu.classList.toggle("is-open");
    aboutTrigger.setAttribute("aria-expanded", String(isOpen));
  });

  document.addEventListener("click", event => {
    if (!aboutMenu.contains(event.target)) {
      aboutMenu.classList.remove("is-open");
      aboutTrigger.setAttribute("aria-expanded", "false");
    }
  });
</script>

<script type="module">
  import { db } from "./firebase.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const bikeTitle = document.getElementById("bikeTitle");
  const bikeDetail = document.getElementById("bikeDetail");

  const params = new URLSearchParams(window.location.search);
  const bikeId = params.get("id");

  function escapeHTML(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function toNumber(value) {
    const number = Number(String(value ?? "").replace(/[^\d.-]/g, ""));
    return Number.isFinite(number) ? number : 0;
  }

  function formatNumber(value) {
    return new Intl.NumberFormat("zh-TW").format(toNumber(value));
  }

  function formatPrice(value) {
    const price = toNumber(value);
    return price > 0 ? `NT$${formatNumber(price)}` : "價格洽詢";
  }

  function getBrand(bike) {
    return bike.brand || bike.bikeBrand || bike.manufacturer || "";
  }

  function getType(bike) {
    return bike.type || bike.bikeType || bike.category || "";
  }

  function renderImages(images = [], name = "車輛圖片") {
    if (!Array.isArray(images) || images.length === 0) {
      return `<div class="card-image-placeholder bike-detail-placeholder">暫無圖片</div>`;
    }

    return `
      <div class="bike-detail-images">
        ${images.map(image => `
          <img src="${escapeHTML(image)}" alt="${escapeHTML(name)}" loading="lazy">
        `).join("")}
      </div>
    `;
  }

  function renderBike(bike) {
    const name = bike.name || "未命名車輛";
    const brand = getBrand(bike) || "-";
    const type = getType(bike) || "未分類";
    const year = bike.year || "-";
    const km = bike.km === "" || bike.km === undefined || bike.km === null
      ? "-"
      : `${formatNumber(bike.km)} km`;

    document.title = `${name}｜誠匠二輪`;
    bikeTitle.textContent = name;

    bikeDetail.innerHTML = `
      <div class="bike-detail-card">
        ${renderImages(bike.images, name)}

        <div class="bike-detail-info">
          <p class="section-kicker">SELECTED BIKE</p>
          <h1>${escapeHTML(name)}</h1>

          <p class="bike-detail-price">${formatPrice(bike.price)}</p>

          <div class="bike-detail-specs">
            <div>
              <span>車種</span>
              <strong>${escapeHTML(type)}</strong>
            </div>

            <div>
              <span>品牌</span>
              <strong>${escapeHTML(brand)}</strong>
            </div>

            <div>
              <span>年份</span>
              <strong>${escapeHTML(year)}</strong>
            </div>

            <div>
              <span>里程</span>
              <strong>${escapeHTML(km)}</strong>
            </div>
          </div>

          <div class="bike-detail-actions">
            <a class="btn" href="https://line.me/ti/p/~cj.motor" target="_blank" rel="noopener">
              LINE 詢問
            </a>

            <a class="btn btn-outline" href="inventory.html">
              回車輛列表
            </a>
          </div>
        </div>
      </div>
    `;
  }

  async function loadBike() {
    if (!bikeId) {
      bikeDetail.innerHTML = "<p class='loading-text'>找不到車輛資料。</p>";
      return;
    }

    try {
      const snapshot = await getDoc(doc(db, "bikes", bikeId));

      if (!snapshot.exists()) {
        bikeDetail.innerHTML = "<p class='loading-text'>這台車可能已下架。</p>";
        return;
      }

      renderBike({
        id: snapshot.id,
        ...snapshot.data()
      });
    } catch (error) {
      console.error(error);
      bikeDetail.innerHTML = "<p class='loading-text'>車輛資料載入失敗，請稍後再試。</p>";
    }
  }

  loadBike();
</script>

</body>
</html>
