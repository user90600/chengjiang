<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車輛列表｜誠匠二輪</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">誠匠二輪</div>
  <nav>
    <a href="index.html">首頁</a>
    <a href="inventory.html">車輛列表</a>
    <a href="sell.html">我要賣車</a>
    <a href="admin.html" id="adminBtn" style="display:none;">後台</a>
  </nav>
</header>

<section class="section">
  <h2>車輛列表</h2>

  <div style="
    max-width:1200px;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
  ">
    <select id="typeFilter" class="search-box">
      <option value="all">全部車種</option>
      <option value="速克達">速克達</option>
      <option value="輕檔車">輕檔車</option>
      <option value="大型重機">大型重機</option>
      <option value="電動車">電動車</option>
    </select>

    <select id="brandFilter" class="search-box">
      <option value="all">全部品牌</option>
    </select>

    <input
      id="searchInput"
      class="search-box"
      placeholder="搜尋車款、品牌、年份"
    >
  </div>

  <div id="bikeList" class="grid"></div>
</section>

<script>
if (localStorage.getItem("isAdmin") === "true") {
  document.getElementById("adminBtn").style.display = "inline-block";
}
</script>

<script type="module">
import { db, collection, getDocs } from "./firebase.js";

const bikeList = document.getElementById("bikeList");
const typeFilter = document.getElementById("typeFilter");
const brandFilter = document.getElementById("brandFilter");
const searchInput = document.getElementById("searchInput");

let bikes = [];

function updateBrandOptions(sourceBikes) {
  const currentBrand = brandFilter.value;

  const brands = [...new Set(
    sourceBikes
      .map(bike => (bike.brand || "").trim())
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b));

  brandFilter.innerHTML = `<option value="all">全部品牌</option>`;

  brands.forEach(brand => {
    brandFilter.innerHTML += `
      <option value="${brand}">${brand}</option>
    `;
  });

  if (brands.includes(currentBrand)) {
    brandFilter.value = currentBrand;
  }
}

function render(list) {
  if (list.length === 0) {
    bikeList.innerHTML = "<p style='text-align:center;'>目前沒有符合條件的車輛。</p>";
    return;
  }

  bikeList.innerHTML = list.map(bike => `
    <a href="bike.html?id=${bike.id}" class="card">
      <img src="${bike.images?.[0] || ""}" alt="${bike.name || "車輛圖片"}">
      <h3>${bike.name || "未命名車輛"}</h3>
      <p>${bike.type || "未分類"}｜${bike.brand || "-"}</p>
      <p>${bike.year || "-"}｜${bike.km || "-"} km</p>
      <p>NT$${bike.price || "-"}</p>
    </a>
  `).join("");
}

function applyFilters() {
  const typeValue = typeFilter.value;
  const brandValue = brandFilter.value;
  const keyword = searchInput.value.trim().toLowerCase();

  const typeBikes = bikes.filter(bike => {
    return typeValue === "all" || bike.type === typeValue;
  });

  updateBrandOptions(typeBikes);

  const filtered = typeBikes.filter(bike => {
    const matchBrand =
      brandValue === "all" || bike.brand === brandValue;

    const searchableText = [
      bike.name,
      bike.brand,
      bike.type,
      bike.year
    ].join(" ").toLowerCase();

    return matchBrand && searchableText.includes(keyword);
  });

  render(filtered);
}

async function loadBikes() {
  const snap = await getDocs(collection(db, "bikes"));

  bikes = snap.docs.map(docSnap => ({
    id: docSnap.id,
    ...docSnap.data()
  }));

  updateBrandOptions(bikes);
  render(bikes);
}

typeFilter.addEventListener("change", () => {
  brandFilter.value = "all";
  applyFilters();
});

brandFilter.addEventListener("change", applyFilters);
searchInput.addEventListener("input", applyFilters);

loadBikes();
</script>

</body>
</html>
