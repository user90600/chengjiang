<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理｜誠匠二輪</title>
  <link rel="stylesheet" href="style.css?v=20260707-4">
</head>

<body class="admin-body">

<header class="navbar">
  <a class="logo" href="index.html">誠匠二輪</a>

  <nav>
    <a href="index.html">回到首頁</a>
    <a href="inventory.html">車輛列表</a>
    <a href="sell.html">我要賣車</a>
  </nav>
</header>

<main class="admin-shell">
  <section id="loginPanel" class="admin-login">
    <p class="section-kicker">ADMIN LOGIN</p>
    <h1>後台管理</h1>
    <p>請輸入管理密碼。</p>

    <label class="admin-input-wrap">
      <span>管理密碼</span>
      <input
        id="adminPassword"
        type="password"
        placeholder="輸入密碼"
        autocomplete="current-password"
      >
    </label>

    <button id="loginBtn" class="btn" type="button">登入後台</button>
    <p id="loginMessage" class="form-message"></p>
  </section>

  <section id="adminPanel" hidden>
    <div class="admin-heading">
      <div>
        <p class="section-kicker">DASHBOARD</p>
        <h1>車輛管理後台</h1>
        <p>
          可新增、編輯、刪除車輛；勾選首頁精選後，首頁會固定顯示該車。
          若沒有任何車被設為精選，首頁會自動隨機跑馬燈輪播。
        </p>
      </div>

      <button id="logoutBtn" class="btn btn-outline" type="button">登出</button>
    </div>

    <section class="admin-card">
      <div class="admin-card-heading">
        <div>
          <p class="section-kicker">BIKE EDITOR</p>
          <h2 id="formTitle">新增車輛</h2>
        </div>

        <button id="cancelEditBtn" class="text-button" type="button" hidden>
          取消編輯
        </button>
      </div>

      <form id="bikeForm">
        <div class="admin-form-grid">
          <label class="admin-input-wrap">
            <span>車名</span>
            <input id="bikeName" type="text" placeholder="例如：Yamaha R15 V3" required>
          </label>

          <label class="admin-input-wrap">
            <span>品牌</span>
            <input id="bikeBrand" type="text" placeholder="例如：Yamaha" required>
          </label>

          <label class="admin-input-wrap">
            <span>車種</span>
            <input id="bikeType" type="text" placeholder="例如：輕檔車、速克達、重機" required>
          </label>

          <label class="admin-input-wrap">
            <span>年份</span>
            <input id="bikeYear" type="number" placeholder="例如：2020" required>
          </label>

          <label class="admin-input-wrap">
            <span>里程</span>
            <input id="bikeKm" type="number" placeholder="例如：15000" required>
          </label>

          <label class="admin-input-wrap">
            <span>售價</span>
            <input id="bikePrice" type="number" placeholder="例如：85000" required>
          </label>

          <label class="admin-input-wrap admin-input-wide">
            <span>車輛照片</span>
            <input id="bikeImages" type="file" accept="image/*" multiple>
            <small>一次最多選擇 4 張。編輯時重新選照片會取代原本照片。</small>
          </label>

          <label class="featured-checkbox">
            <input id="bikeFeatured" type="checkbox">

            <span>
              <strong>設為首頁精選車輛</strong>
              <small>勾選後首頁會固定顯示這台車；全部取消後首頁才會跑馬燈輪播。</small>
            </span>
          </label>
        </div>

        <div id="currentImages" class="current-images" hidden></div>

        <div class="admin-form-actions">
          <button id="saveBikeBtn" class="btn" type="submit">新增車輛</button>
          <p id="bikeFormMessage" class="form-message"></p>
        </div>
      </form>
    </section>

    <section class="admin-card">
      <div class="admin-card-heading">
        <div>
          <p class="section-kicker">CURRENT BIKES</p>
          <h2>已上架車輛</h2>
        </div>

        <button id="refreshBikesBtn" class="text-button" type="button">
          重新整理
        </button>
      </div>

      <input
        id="adminBikeSearch"
        class="admin-bike-search"
        type="search"
        placeholder="搜尋車名、品牌、車種、年份、價格、里程"
        autocomplete="off"
      >

      <p id="adminBikeCount" class="admin-bike-count">載入車輛中...</p>

      <div id="adminBikeList" class="admin-bike-list">
        <p class="loading-text">載入車輛中...</p>
      </div>
    </section>

    <section class="admin-card">
      <div class="admin-card-heading">
        <div>
          <p class="section-kicker">SELL REQUESTS</p>
          <h2>賣車詢問</h2>
        </div>

        <button id="refreshRequestsBtn" class="text-button" type="button">
          重新整理
        </button>
      </div>

      <div id="sellRequestList" class="sell-request-list">
        <p class="loading-text">載入詢問中...</p>
      </div>
    </section>
  </section>
</main>

<script type="module">
  import { db } from "./firebase.js";

  import {
    addDoc,
    collection,
    deleteDoc,
    doc,
    getDocs,
    serverTimestamp,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const ADMIN_PASSWORD = "chengjiang123";

  const CLOUD_NAME = "bjw5m0af";
  const UPLOAD_PRESET = "tnfxxoqb";

  const loginPanel = document.getElementById("loginPanel");
  const adminPanel = document.getElementById("adminPanel");
  const adminPassword = document.getElementById("adminPassword");
  const loginBtn = document.getElementById("loginBtn");
  const loginMessage = document.getElementById("loginMessage");
  const logoutBtn = document.getElementById("logoutBtn");

  const bikeForm = document.getElementById("bikeForm");
  const bikeName = document.getElementById("bikeName");
  const bikeBrand = document.getElementById("bikeBrand");
  const bikeType = document.getElementById("bikeType");
  const bikeYear = document.getElementById("bikeYear");
  const bikeKm = document.getElementById("bikeKm");
  const bikePrice = document.getElementById("bikePrice");
  const bikeImages = document.getElementById("bikeImages");
  const bikeFeatured = document.getElementById("bikeFeatured");

  const formTitle = document.getElementById("formTitle");
  const saveBikeBtn = document.getElementById("saveBikeBtn");
  const cancelEditBtn = document.getElementById("cancelEditBtn");
  const bikeFormMessage = document.getElementById("bikeFormMessage");
  const currentImages = document.getElementById("currentImages");

  const adminBikeSearch = document.getElementById("adminBikeSearch");
  const adminBikeCount = document.getElementById("adminBikeCount");
  const adminBikeList = document.getElementById("adminBikeList");
  const sellRequestList = document.getElementById("sellRequestList");

  const refreshBikesBtn = document.getElementById("refreshBikesBtn");
  const refreshRequestsBtn = document.getElementById("refreshRequestsBtn");

  let bikes = [];
  let editingBike = null;

  function escapeHTML(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function toNumber(value) {
    const number = Number(String(value ?? "").replace(/[^\d.-]/g, ""));
    return Number.isFinite(number) ? number : 0;
  }

  function formatNumber(value) {
    return new Intl.NumberFormat("zh-TW").format(toNumber(value));
  }

  function formatPrice(value) {
    const price = toNumber(value);
    return price > 0 ? `NT$${formatNumber(price)}` : "價格洽詢";
  }

  function isFeatured(bike) {
    return bike.featured === true || String(bike.featured).toLowerCase() === "true";
  }

  function getBrand(bike) {
    return bike.brand || bike.bikeBrand || bike.manufacturer || "";
  }

  function getType(bike) {
    return bike.type || bike.bikeType || bike.category || "";
  }

  function getImage(bike) {
    return Array.isArray(bike.images) ? bike.images[0] || "" : "";
  }

  function timestampValue(value) {
    if (value?.toMillis) return value.toMillis();
    if (value?.toDate) return value.toDate().getTime();
    return 0;
  }

  function sortByCreatedAt(list) {
    return [...list].sort((first, second) => {
      return timestampValue(second.createdAt) - timestampValue(first.createdAt);
    });
  }

  function showMessage(element, message, type = "") {
    element.textContent = message;
    element.className = `form-message ${type}`.trim();
  }

  function setSaving(isSaving) {
    saveBikeBtn.disabled = isSaving;

    if (isSaving) {
      saveBikeBtn.textContent = "處理中...";
      return;
    }

    saveBikeBtn.textContent = editingBike ? "儲存修改" : "新增車輛";
  }

  function setLoggedIn(isLoggedIn) {
    loginPanel.hidden = isLoggedIn;
    adminPanel.hidden = !isLoggedIn;
  }

  function openAdmin() {
    setLoggedIn(true);
    loadBikes();
    loadSellRequests();
  }

  function renderCurrentImages(images = []) {
    if (!images.length) {
      currentImages.hidden = true;
      currentImages.innerHTML = "";
      return;
    }

    currentImages.hidden = false;

    currentImages.innerHTML = `
      <p>目前照片</p>

      <div class="current-image-grid">
        ${images.map(url => `
          <img src="${escapeHTML(url)}" alt="車輛照片">
        `).join("")}
      </div>
    `;
  }

  function resetBikeForm() {
    editingBike = null;
    bikeForm.reset();

    formTitle.textContent = "新增車輛";
    cancelEditBtn.hidden = true;

    renderCurrentImages([]);
    showMessage(bikeFormMessage, "");
    setSaving(false);
  }

  function startEdit(bike) {
    editingBike = bike;

    bikeName.value = bike.name || "";
    bikeBrand.value = getBrand(bike);
    bikeType.value = getType(bike);
    bikeYear.value = bike.year || "";
    bikeKm.value = toNumber(bike.km);
    bikePrice.value = toNumber(bike.price);
    bikeFeatured.checked = isFeatured(bike);

    formTitle.textContent = `編輯車輛：${bike.name || "未命名車輛"}`;
    cancelEditBtn.hidden = false;

    renderCurrentImages(Array.isArray(bike.images) ? bike.images : []);

    showMessage(bikeFormMessage, "");
    setSaving(false);

    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }

  function getFilteredAdminBikes() {
    const keyword = adminBikeSearch.value.trim().toLowerCase();

    if (!keyword) {
      return sortByCreatedAt(bikes);
    }

    return sortByCreatedAt(bikes).filter(bike => {
      const searchableText = [
        bike.name,
        getBrand(bike),
        getType(bike),
        bike.year,
        bike.km,
        bike.price
      ].join(" ").toLowerCase();

      return searchableText.includes(keyword);
    });
  }

  function renderBikeList() {
    const filteredBikes = getFilteredAdminBikes();

    adminBikeCount.textContent = `顯示 ${filteredBikes.length} / ${bikes.length} 台車輛`;

    if (filteredBikes.length === 0) {
      adminBikeList.innerHTML = `
        <p class="loading-text">
          找不到符合搜尋條件的車輛。
        </p>
      `;
      return;
    }

    adminBikeList.innerHTML = filteredBikes.map(bike => {
      const image = getImage(bike);

      return `
        <article class="admin-bike-item">
          <div class="admin-bike-image">
            ${
              image
                ? `<img src="${escapeHTML(image)}" alt="${escapeHTML(bike.name || "車輛圖片")}">`
                : `<div class="admin-bike-placeholder">暫無圖片</div>`
            }
          </div>

          <div class="admin-bike-content">
            <div class="admin-bike-title-row">
              <div>
                <p class="admin-badge ${isFeatured(bike) ? "is-featured" : ""}">
                  ${isFeatured(bike) ? "首頁精選" : "一般上架"}
                </p>

                <h3>${escapeHTML(bike.name || "未命名車輛")}</h3>
              </div>

              <label class="mini-featured-toggle">
                <input
                  type="checkbox"
                  data-featured-id="${escapeHTML(bike.id)}"
                  ${isFeatured(bike) ? "checked" : ""}
                >
                <span>首頁精選</span>
              </label>
            </div>

            <p>${escapeHTML(getType(bike) || "未分類")}｜${escapeHTML(getBrand(bike) || "-")}</p>
            <p>${escapeHTML(bike.year || "-")}｜${formatNumber(bike.km)} km｜${formatPrice(bike.price)}</p>

            <div class="admin-bike-actions">
              <button class="text-button" type="button" data-action="edit" data-id="${escapeHTML(bike.id)}">
                編輯
              </button>

              <button class="text-button danger" type="button" data-action="delete" data-id="${escapeHTML(bike.id)}">
                刪除
              </button>
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function requestValue(data, keys) {
    for (const key of keys) {
      if (data[key] !== undefined && data[key] !== null && data[key] !== "") {
        return data[key];
      }
    }

    return "";
  }

  function formatRequestDate(value) {
    const milliseconds = timestampValue(value);

    if (!milliseconds) return "";

    return new Intl.DateTimeFormat("zh-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    }).format(new Date(milliseconds));
  }

  function renderSellRequests(requests) {
    if (!requests.length) {
      sellRequestList.innerHTML = "<p class='loading-text'>目前尚無賣車詢問。</p>";
      return;
    }

    sellRequestList.innerHTML = sortByCreatedAt(requests).map(request => {
      const name = requestValue(request, ["name", "customerName", "sellerName"]) || "未填姓名";
      const phone = requestValue(request, ["phone", "tel", "phoneNumber"]) || "未填電話";
      const bikeNameValue = requestValue(request, ["bikeName", "model", "bikeModel", "vehicle"]) || "未填車款";
      const brand = requestValue(request, ["brand"]) || "";
      const year = requestValue(request, ["year"]) || "";
      const km = requestValue(request, ["km", "mileage"]) || "";
      const price = requestValue(request, ["price", "expectedPrice", "askingPrice"]) || "";
      const message = requestValue(request, ["message", "note", "description"]) || "";
      const createdAt = formatRequestDate(request.createdAt);

      return `
        <article class="sell-request-item">
          <div class="sell-request-head">
            <h3>${escapeHTML(name)}</h3>
            <span>${escapeHTML(createdAt)}</span>
          </div>

          <p><strong>電話：</strong>${escapeHTML(phone)}</p>
          <p><strong>車輛：</strong>${escapeHTML([brand, bikeNameValue].filter(Boolean).join(" "))}</p>
          <p><strong>年份／里程：</strong>${escapeHTML(year || "-")}／${km === "" ? "-" : `${formatNumber(km)} km`}</p>
          <p><strong>預計售價：</strong>${price === "" ? "-" : formatPrice(price)}</p>

          ${
            message
              ? `<p class="sell-request-message"><strong>備註：</strong>${escapeHTML(message)}</p>`
              : ""
          }
        </article>
      `;
    }).join("");
  }

  async function uploadOneImage(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const response = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    if (!response.ok) {
      throw new Error("照片上傳失敗");
    }

    const result = await response.json();

    return result.secure_url;
  }

  async function uploadImages(files) {
    return Promise.all([...files].map(uploadOneImage));
  }

  async function loadBikes() {
    adminBikeList.innerHTML = "<p class='loading-text'>載入車輛中...</p>";
    adminBikeCount.textContent = "載入車輛中...";

    try {
      const snapshot = await getDocs(collection(db, "bikes"));

      bikes = snapshot.docs.map(item => ({
        id: item.id,
        ...item.data()
      }));

      renderBikeList();
    } catch (error) {
      console.error(error);

      adminBikeCount.textContent = "車輛資料載入失敗";
      adminBikeList.innerHTML = "<p class='loading-text'>車輛資料載入失敗。</p>";
    }
  }

  async function loadSellRequests() {
    sellRequestList.innerHTML = "<p class='loading-text'>載入詢問中...</p>";

    try {
      const snapshot = await getDocs(collection(db, "sellRequests"));

      const requests = snapshot.docs.map(item => ({
        id: item.id,
        ...item.data()
      }));

      renderSellRequests(requests);
    } catch (error) {
      console.error(error);
      sellRequestList.innerHTML = "<p class='loading-text'>賣車詢問資料載入失敗。</p>";
    }
  }

  loginBtn.addEventListener("click", () => {
    if (adminPassword.value === ADMIN_PASSWORD) {
      localStorage.setItem("isAdmin", "true");
      showMessage(loginMessage, "");
      openAdmin();
      return;
    }

    showMessage(loginMessage, "密碼不正確，請再試一次。", "error");
  });

  adminPassword.addEventListener("keydown", event => {
    if (event.key === "Enter") {
      loginBtn.click();
    }
  });

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("isAdmin");
    setLoggedIn(false);
    adminPassword.value = "";
    resetBikeForm();
  });

  bikeForm.addEventListener("submit", async event => {
    event.preventDefault();

    const files = [...bikeImages.files];

    if (files.length > 4) {
      showMessage(bikeFormMessage, "一次最多只能上傳 4 張照片。", "error");
      return;
    }

    const payload = {
      name: bikeName.value.trim(),
      brand: bikeBrand.value.trim(),
      type: bikeType.value.trim(),
      year: toNumber(bikeYear.value),
      km: toNumber(bikeKm.value),
      price: toNumber(bikePrice.value),
      featured: bikeFeatured.checked,
      updatedAt: serverTimestamp()
    };

    try {
      setSaving(true);
      showMessage(bikeFormMessage, "");

      if (editingBike) {
        if (files.length > 0) {
          payload.images = await uploadImages(files);
        }

        await updateDoc(doc(db, "bikes", editingBike.id), payload);

        showMessage(bikeFormMessage, "車輛資料已儲存。", "success");
      } else {
        payload.images = files.length > 0 ? await uploadImages(files) : [];
        payload.createdAt = serverTimestamp();

        await addDoc(collection(db, "bikes"), payload);

        showMessage(bikeFormMessage, "車輛已新增。", "success");
      }

      await loadBikes();

      setTimeout(() => {
        resetBikeForm();
      }, 700);
    } catch (error) {
      console.error(error);
      showMessage(bikeFormMessage, error.message || "儲存失敗，請再試一次。", "error");
      setSaving(false);
    }
  });

  cancelEditBtn.addEventListener("click", resetBikeForm);

  adminBikeSearch.addEventListener("input", renderBikeList);

  refreshBikesBtn.addEventListener("click", () => {
    adminBikeSearch.value = "";
    loadBikes();
  });

  refreshRequestsBtn.addEventListener("click", loadSellRequests);

  adminBikeList.addEventListener("click", async event => {
    const button = event.target.closest("button[data-action]");

    if (!button) return;

    const bike = bikes.find(item => item.id === button.dataset.id);

    if (!bike) return;

    if (button.dataset.action === "edit") {
      startEdit(bike);
      return;
    }

    if (button.dataset.action === "delete") {
      const confirmed = window.confirm(`確定要刪除「${bike.name || "這台車"}」嗎？`);

      if (!confirmed) return;

      try {
        await deleteDoc(doc(db, "bikes", bike.id));

        if (editingBike?.id === bike.id) {
          resetBikeForm();
        }

        await loadBikes();
      } catch (error) {
        console.error(error);
        window.alert("刪除失敗，請再試一次。");
      }
    }
  });

  adminBikeList.addEventListener("change", async event => {
    const input = event.target;

    if (!input.matches("input[data-featured-id]")) return;

    try {
      await updateDoc(doc(db, "bikes", input.dataset.featuredId), {
        featured: input.checked,
        updatedAt: serverTimestamp()
      });

      await loadBikes();
    } catch (error) {
      console.error(error);
      window.alert("更新首頁精選設定失敗，請再試一次。");
      await loadBikes();
    }
  });

  if (localStorage.getItem("isAdmin") === "true") {
    openAdmin();
  } else {
    setLoggedIn(false);
  }
</script>

</body>
</html>
