<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理｜誠匠二輪</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">誠匠二輪｜後台</div>
  <nav>
    <a href="index.html">返回首頁</a>
    <a href="inventory.html">車輛列表</a>
  </nav>
</header>

<section class="section">
  <h2 id="formTitle">新增車輛</h2>

  <div style="max-width:900px; margin:auto;">
    <input id="name" class="search-box" placeholder="車名，例如 YAMAHA R15 V3">

    <input
      id="brand"
      class="search-box"
      list="brandOptions"
      placeholder="品牌，例如 YAMAHA、HONDA、BMW"
    >

    <datalist id="brandOptions">
      <option value="YAMAHA">
      <option value="HONDA">
      <option value="KAWASAKI">
      <option value="SYM">
      <option value="KYMCO">
      <option value="SUZUKI">
      <option value="GOGORO">
      <option value="CFMOTO">
      <option value="APRILIA">
      <option value="BMW">
      <option value="Vespa">
    </datalist>

    <select id="type" class="search-box">
      <option value="">選擇車種</option>
      <option value="速克達">速克達</option>
      <option value="輕檔車">輕檔車</option>
      <option value="大型重機">大型重機</option>
      <option value="電動車">電動車</option>
    </select>

    <input id="year" class="search-box" placeholder="年份，例如 2021">
    <input id="km" class="search-box" placeholder="里程，例如 12000">
    <input id="price" class="search-box" placeholder="售價，例如 98000">
    <input id="cc" class="search-box" placeholder="排氣量，例如 155 c.c.">
    <input id="condition" class="search-box" placeholder="車況，例如 原廠良好、定期保養">
    <input id="location" class="search-box" placeholder="所在地，例如 台東市">

    <textarea
      id="mods"
      class="search-box"
      placeholder="改裝品，例如 短拉桿、腳踏後移、排氣管、防倒球"
      style="min-height:130px; resize:vertical;"
    ></textarea>

    <p style="margin:25px 0 10px; font-weight:bold;">
      車輛照片：請依序選擇 車頭 / 左側 / 右側 / 車尾
    </p>

    <input
      id="images"
      type="file"
      multiple
      accept="image/*"
      class="search-box"
    >

    <p id="editTip" style="display:none; color:#c9a227; font-size:16px;">
      編輯中：若不重新選照片，會保留原本車輛照片。
    </p>

    <div style="margin-top:20px;">
      <button id="submitBtn" class="btn" type="button">新增車輛</button>
      <button
        id="cancelBtn"
        class="btn"
        type="button"
        style="display:none; background:transparent; color:#c9a227;"
      >
        取消編輯
      </button>
    </div>
  </div>
</section>

<section class="section">
  <h2>已上架車輛</h2>
  <div id="bikeList" class="grid"></div>
</section>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const CLOUD_NAME = "bjw5m0af";
const UPLOAD_PRESET = "tnfxxoqb";

const nameInput = document.getElementById("name");
const brandInput = document.getElementById("brand");
const typeInput = document.getElementById("type");
const yearInput = document.getElementById("year");
const kmInput = document.getElementById("km");
const priceInput = document.getElementById("price");
const ccInput = document.getElementById("cc");
const conditionInput = document.getElementById("condition");
const locationInput = document.getElementById("location");
const modsInput = document.getElementById("mods");
const imagesInput = document.getElementById("images");

const submitBtn = document.getElementById("submitBtn");
const cancelBtn = document.getElementById("cancelBtn");
const formTitle = document.getElementById("formTitle");
const editTip = document.getElementById("editTip");
const bikeList = document.getElementById("bikeList");

let editingId = null;
let editingBike = null;
let bikes = [];

async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const response = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();

  if (!data.secure_url) {
    throw new Error("圖片上傳失敗");
  }

  return data.secure_url;
}

function resetForm() {
  editingId = null;
  editingBike = null;

  nameInput.value = "";
  brandInput.value = "";
  typeInput.value = "";
  yearInput.value = "";
  kmInput.value = "";
  priceInput.value = "";
  ccInput.value = "";
  conditionInput.value = "";
  locationInput.value = "";
  modsInput.value = "";
  imagesInput.value = "";

  formTitle.textContent = "新增車輛";
  submitBtn.textContent = "新增車輛";
  cancelBtn.style.display = "none";
  editTip.style.display = "none";
}

function getBikeData(images) {
  return {
    name: nameInput.value.trim(),
    brand: brandInput.value.trim(),
    type: typeInput.value,
    year: yearInput.value.trim(),
    km: kmInput.value.trim(),
    price: priceInput.value.trim(),
    cc: ccInput.value.trim(),
    condition: conditionInput.value.trim(),
    location: locationInput.value.trim(),
    mods: modsInput.value.trim(),
    images
  };
}

async function saveBike() {
  if (!nameInput.value.trim() || !brandInput.value.trim() || !typeInput.value) {
    alert("請至少填寫車名、品牌與車種。");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "處理中...";

  try {
    const files = Array.from(imagesInput.files);
    let imageUrls = editingBike?.images || [];

    if (files.length > 0) {
      imageUrls = [];

      for (const file of files) {
        const url = await uploadToCloudinary(file);
        imageUrls.push(url);
      }
    }

    const bikeData = getBikeData(imageUrls);

    if (editingId) {
      await updateDoc(doc(db, "bikes", editingId), bikeData);
      alert("車輛資料已更新。");
    } else {
      await addDoc(collection(db, "bikes"), bikeData);
      alert("車輛新增成功。");
    }

    resetForm();
    await loadBikes();

  } catch (error) {
    console.error(error);
    alert("儲存失敗，請檢查網路或圖片後再試一次。");
  } finally {
    submitBtn.disabled = false;

    if (!editingId) {
      submitBtn.textContent = "新增車輛";
    }
  }
}

function startEdit(id) {
  const bike = bikes.find(item => item.id === id);

  if (!bike) return;

  editingId = bike.id;
  editingBike = bike;

  nameInput.value = bike.name || "";
  brandInput.value = bike.brand || "";
  typeInput.value = bike.type || "";
  yearInput.value = bike.year || "";
  kmInput.value = bike.km || "";
  priceInput.value = bike.price || "";
  ccInput.value = bike.cc || "";
  conditionInput.value = bike.condition || "";
  locationInput.value = bike.location || "";
  modsInput.value = bike.mods || "";
  imagesInput.value = "";

  formTitle.textContent = "編輯車輛";
  submitBtn.textContent = "儲存修改";
  cancelBtn.style.display = "inline-block";
  editTip.style.display = "block";

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

async function removeBike(id) {
  const confirmed = confirm("確定要刪除這台車嗎？刪除後前台也會立刻消失。");

  if (!confirmed) return;

  try {
    await deleteDoc(doc(db, "bikes", id));

    if (editingId === id) {
      resetForm();
    }

    await loadBikes();
    alert("車輛已刪除。");
  } catch (error) {
    console.error(error);
    alert("刪除失敗，請再試一次。");
  }
}

async function loadBikes() {
  const snap = await getDocs(collection(db, "bikes"));

  bikes = snap.docs.map(docSnap => ({
    id: docSnap.id,
    ...docSnap.data()
  }));

  if (bikes.length === 0) {
    bikeList.innerHTML = "<p>目前還沒有上架車輛。</p>";
    return;
  }

  bikeList.innerHTML = bikes.map(bike => `
    <div class="card">
      <img src="${bike.images?.[0] || ""}" alt="${bike.name || "車輛圖片"}">
      <h3>${bike.name || "未命名車輛"}</h3>
      <p>${bike.type || "未分類"}｜${bike.brand || "-"}</p>
      <p>${bike.year || "-"}｜${bike.km || "-"} km</p>
      <p>NT$${bike.price || "-"}</p>

      <div style="
        display:flex;
        gap:10px;
        justify-content:center;
        padding:0 12px 18px;
      ">
        <button class="btn edit-btn" type="button" data-id="${bike.id}">
          編輯
        </button>

        <button
          class="btn delete-btn"
          type="button"
          data-id="${bike.id}"
          style="background:#222; color:#fff; border-color:#222;"
        >
          刪除
        </button>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".edit-btn").forEach(button => {
    button.addEventListener("click", () => startEdit(button.dataset.id));
  });

  document.querySelectorAll(".delete-btn").forEach(button => {
    button.addEventListener("click", () => removeBike(button.dataset.id));
  });
}

submitBtn.addEventListener("click", saveBike);
cancelBtn.addEventListener("click", resetForm);

loadBikes();
</script>

</body>
</html>
